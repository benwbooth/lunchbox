name: Release artifacts

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  CSC_IDENTITY_AUTO_DISCOVERY: 'false'

jobs:
  appimage:
    name: Linux AppImage
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: electron/package-lock.json
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-0 libnss3 libxss1 libasound2t64 libgbm1 libatk-bridge2.0-0 libsecret-1-dev libssl-dev libsqlite3-dev binaryen zstd pkg-config
          cargo install trunk --locked
      - name: Install npm dependencies
        run: npm --prefix electron ci
      - name: Build AppImage
        run: tools/build-appimage.sh
      - uses: actions/upload-artifact@v4
        with:
          name: lunchbox-appimage
          path: dist/*.AppImage
          if-no-files-found: error

  flatpak:
    name: Linux Flatpak
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: electron/package-lock.json
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y flatpak flatpak-builder libgtk-3-0 libnss3 libxss1 libasound2t64 libgbm1 libatk-bridge2.0-0 libsecret-1-dev libssl-dev libsqlite3-dev binaryen zstd pkg-config
          cargo install trunk --locked
      - name: Install npm dependencies
        run: npm --prefix electron ci
      - name: Build Flatpak bundle and repo
        run: dbus-run-session -- tools/build-flatpak.sh
      - uses: actions/upload-artifact@v4
        with:
          name: lunchbox-flatpak
          path: dist/*.flatpak
          if-no-files-found: error
      - uses: actions/upload-artifact@v4
        with:
          name: lunchbox-flatpak-repo
          path: dist/lunchbox-flatpak-repo-*.tar.gz
          if-no-files-found: error

  macos:
    name: macOS DMG
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: electron/package-lock.json
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - name: Install Trunk
        run: cargo install trunk --locked
      - name: Install npm dependencies
        run: npm --prefix electron ci
      - name: Build DMG
        run: npm --prefix electron run dist:mac
      - uses: actions/upload-artifact@v4
        with:
          name: lunchbox-dmg
          path: dist/electron/*.dmg
          if-no-files-found: error

  windows:
    name: Windows MSI
    runs-on: windows-2025
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: electron/package-lock.json
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - name: Install Trunk
        run: cargo install trunk --locked
      - name: Install npm dependencies
        run: npm --prefix electron ci
      - name: Build MSI
        run: npm --prefix electron run dist:win
      - uses: actions/upload-artifact@v4
        with:
          name: lunchbox-msi
          path: dist/electron/*.msi
          if-no-files-found: error

  nix:
    name: Nix package
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v31
      - name: Build flake package
        run: nix build .#packages.x86_64-linux.default

  pages:
    name: Publish Flatpak repo
    runs-on: ubuntu-24.04
    needs: flatpak
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
      - name: Download Flatpak repo
        uses: actions/download-artifact@v4
        with:
          name: lunchbox-flatpak-repo
          path: .
      - name: Stage gh-pages content
        run: |
          set -e
          mkdir -p pages-out
          repo_archive="$(find . -name 'lunchbox-flatpak-repo-*.tar.gz' -type f -print -quit)"
          test -n "$repo_archive"
          tar -C pages-out -xzf "$repo_archive"
          REPO_URL="https://${GITHUB_REPOSITORY_OWNER}.github.io/lunchbox"
          {
            echo "[Flatpak Repo]"
            echo "Title=Lunchbox"
            echo "Url=$REPO_URL/repo/"
            echo "Homepage=https://github.com/${GITHUB_REPOSITORY}"
            echo "Description=Cross-platform emulator frontend. Self-published; add with --no-gpg-verify."
            echo "NoGPGVerify=true"
          } > pages-out/lunchbox.flatpakrepo
          python3 - "$REPO_URL" "$GITHUB_REPOSITORY" > pages-out/index.html <<'PY'
          import sys
          repo_url, gh_repo = sys.argv[1], sys.argv[2]
          print(f"""<!doctype html>
          <html lang="en"><head><meta charset="utf-8">
          <title>Lunchbox Flatpak repo</title>
          <style>
            body {{ font-family: system-ui, sans-serif; max-width: 720px; margin: 3em auto; padding: 0 1em; line-height: 1.5; }}
            code, pre {{ font-family: ui-monospace, monospace; background: #f4f4f4; padding: .2em .4em; border-radius: 3px; }}
            pre {{ padding: .8em 1em; overflow-x: auto; white-space: pre; }}
            h1, h2 {{ margin-top: 1.5em; }}
          </style></head><body>
          <h1>Lunchbox Flatpak repo</h1>
          <p>Cross-platform emulator frontend. Source on <a href="https://github.com/{gh_repo}">GitHub</a>.</p>
          <h2>Install</h2>
          <pre>flatpak --user remote-add --no-gpg-verify lunchbox \\
              {repo_url}/lunchbox.flatpakrepo
          flatpak --user install lunchbox io.github.benwbooth.lunchbox</pre>
          <p>Update later with <code>flatpak --user update io.github.benwbooth.lunchbox</code>.</p>
          <h2>Other downloads</h2>
          <p>AppImage, Flatpak bundle, Windows, and macOS binaries: <a href="https://github.com/{gh_repo}/releases/latest">latest GitHub release</a>.</p>
          </body></html>""")
          PY
          find pages-out -maxdepth 2 -type f -print
      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./pages-out
          force_orphan: true

  release:
    name: GitHub Release
    runs-on: ubuntu-24.04
    needs:
      - appimage
      - flatpak
      - macos
      - windows
      - nix
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release-artifacts
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            release-artifacts/**/*.AppImage
            release-artifacts/**/*.flatpak
            release-artifacts/**/*.tar.gz
            release-artifacts/**/*.dmg
            release-artifacts/**/*.msi
